services:
  # ── Reverse proxy + automatic HTTPS ────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    depends_on:
      - api
      - web

  # ── Rails API ───────────────────────────────────────────────────────────────
  api:
    build: ./api
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      RAILS_LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Sidekiq (background jobs) ───────────────────────────────────────────────
  sidekiq:
    build: ./api
    restart: unless-stopped
    command: bundle exec sidekiq
    environment:
      RAILS_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_ENDPOINT: ${AWS_ENDPOINT}
      RAILS_LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped

  # ── PostgreSQL + PostGIS ────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: findmypet_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── Evolution API (WhatsApp) ────────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      SERVER_URL: https://wa.${DOMAIN}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # Persistência da sessão WhatsApp no PostgreSQL
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/findmypet_production
      DATABASE_CONNECTION_CLIENT_NAME: findmypet
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
