name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── Rails: testes + Rubocop ───────────────────────────────────────────────
  backend:
    name: "Rails — tests & lint"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: findmypet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DEVISE_JWT_SECRET_KEY: ci-test-secret-key
      RAILS_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.2"
          bundler-cache: true
          working-directory: api

      - name: Load test database schema
        run: bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rails test

      - name: Run Rubocop
        run: bundle exec rubocop

  # ─── Next.js: testes + ESLint ──────────────────────────────────────────────
  frontend:
    name: "Next.js — tests & lint"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

      - name: Run ESLint
        run: npm run lint

  # ─── Deploy → Render (só em push para main) ───────────────────────────────
  # Pré-requisito: adicionar os Deploy Hook URLs como secrets no GitHub:
  #   Settings → Secrets and variables → Actions → New repository secret
  #
  #   RENDER_DEPLOY_HOOK_API       → Render > findmypet-api      > Settings > Deploy Hook
  #   RENDER_DEPLOY_HOOK_SIDEKIQ   → Render > findmypet-sidekiq  > Settings > Deploy Hook
  #   RENDER_DEPLOY_HOOK_WEB       → Render > findmypet-web      > Settings > Deploy Hook
  #   RENDER_DEPLOY_HOOK_EVOLUTION → Render > findmypet-evolution > Settings > Deploy Hook
  deploy:
    name: "Deploy → Render"
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: false # desativado — remover esta linha para reativar o CD

    steps:
      # API primeiro — o entrypoint roda db:prepare antes de iniciar o servidor
      - name: Deploy API
        run: curl -fsS --retry 3 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      # Aguarda o suficiente para a API terminar as migrations antes do Sidekiq subir
      - name: Aguardar API inicializar
        run: sleep 30

      - name: Deploy Sidekiq
        run: curl -fsS --retry 3 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_SIDEKIQ }}"

      - name: Deploy Web
        run: curl -fsS --retry 3 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"

      - name: Deploy Evolution API
        run: curl -fsS --retry 3 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_EVOLUTION }}"
